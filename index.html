<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ห้องน้ำนครพนม</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#0d1117;color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

#header{background:linear-gradient(135deg,#0a1f12 0%,#0f2d1a 100%);padding:12px 16px 10px;border-bottom:2px solid #c9a84c;flex-shrink:0;z-index:1000;}
#header-inner{display:flex;align-items:center;gap:10px;}
#header-icon{width:40px;height:40px;background:linear-gradient(135deg,#c9a84c,#e8c56a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 12px rgba(201,168,76,0.5);}
#header-title{font-size:18px;font-weight:700;color:#f0d080;letter-spacing:0.3px;}
#header-sub{font-size:10px;color:#52b788;margin-top:1px;}

#filter-bar{background:#0a1510;padding:8px 12px;display:flex;gap:7px;overflow-x:auto;border-bottom:1px solid #1a3020;flex-shrink:0;z-index:1000;}
#filter-bar::-webkit-scrollbar{display:none;}
.chip{background:transparent;border:1px solid #c9a84c;border-radius:20px;padding:5px 14px;font-size:12px;color:#c9a84c;white-space:nowrap;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;}
.chip.active{background:#c9a84c;color:#0a1f12;font-weight:700;}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#map{flex:1;width:100%;}

.maplibregl-popup-content{background:#0f2418!important;border:1.5px solid #c9a84c!important;border-radius:14px!important;padding:14px 16px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;min-width:210px!important;}
.maplibregl-popup-close-button{color:#c9a84c!important;font-size:18px!important;right:8px!important;top:6px!important;}
.maplibregl-popup-tip{border-top-color:#c9a84c!important;border-bottom-color:#c9a84c!important;}

#route-bar{display:none;position:absolute;top:10px;left:10px;right:10px;z-index:900;background:#0f2418;border:1.5px solid #c9a84c;border-radius:14px;padding:10px 14px;flex-direction:row;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
#route-bar.show{display:flex;}
#route-name{font-size:13px;font-weight:700;color:#f0d080;}
#route-detail{font-size:11px;color:#52b788;margin-top:2px;}
#route-cancel{background:#2a0f08;border:none;border-radius:8px;padding:7px 12px;font-size:12px;color:#e07050;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600;white-space:nowrap;flex-shrink:0;}

#bottom-sheet{position:absolute;bottom:0;left:0;right:0;z-index:800;background:#0d1a12;border-radius:18px 18px 0 0;border-top:2px solid #c9a84c;transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);transform:translateY(calc(100% - 56px));max-height:75vh;display:flex;flex-direction:column;}
#bottom-sheet.open{transform:translateY(0);}
#sheet-handle-area{padding:10px 16px 6px;cursor:pointer;flex-shrink:0;}
#sheet-handle{width:36px;height:4px;background:#c9a84c;border-radius:2px;margin:0 auto 8px;opacity:0.5;}
#sheet-summary{display:flex;align-items:center;justify-content:space-between;}
#sheet-title{font-size:13px;font-weight:600;color:#f0d080;}
#count-label{font-size:12px;color:#c9a84c;font-weight:700;}
#sheet-content{overflow-y:auto;flex:1;}
#sheet-content::-webkit-scrollbar{width:3px;}
#sheet-content::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:2px;}

.sec-div{padding:6px 16px;font-size:10px;font-weight:700;letter-spacing:0.5px;border-bottom:1px solid #1a2e1a;}
.sec-div.near-div{color:#c9a84c;background:#0a1e10;}
.sec-div.far-div{color:#4a7a5a;background:#0a1510;}

.toilet-item{padding:11px 16px;border-bottom:1px solid #141e14;display:flex;align-items:center;gap:10px;cursor:pointer;background:#0d1a12;}
.toilet-item:active{background:#111e14;}
.toilet-item.nearby{border-left:3px solid #c9a84c;}
.toilet-item.far{border-left:3px solid #2a4a2a;}
.ti-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ti-icon.free{background:#0d2a14;}
.ti-icon.paid{background:#2a0f08;}
.ti-name{font-size:13px;font-weight:600;color:#e8e8e8;}
.ti-meta{font-size:11px;color:#52b788;margin-top:1px;}
.tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;}
.tag-green{background:#0d2a14;color:#52b788;}
.tag-orange{background:#2a0f08;color:#e07050;}
.tag-blue{background:#08142a;color:#5090d0;}
.tag-yellow{background:#1a1408;color:#c9a84c;}
.ti-dist{font-size:12px;font-weight:700;white-space:nowrap;margin-left:auto;padding-left:8px;}
.ti-dist.near{color:#c9a84c;}
.ti-dist.far{color:#3a5a3a;}

#tab-bar{background:#0a1510;border-top:1.5px solid #1a3020;display:flex;align-items:flex-end;padding:0 0 8px;flex-shrink:0;position:relative;z-index:1000;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 0;cursor:pointer;font-size:10px;color:#3a6a3a;}
.tab-item.active{color:#52b788;}
.tab-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;}
#locate-tab{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding-bottom:0;margin-top:-1px;}
#locate-circle{background:linear-gradient(135deg,#c9a84c,#e8c56a);border-radius:50%;width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid #0a1510;box-shadow:0 3px 16px rgba(201,168,76,0.5);}
#locate-circle.loading{background:#2a3a2a;}
#locate-label{font-size:10px;color:#c9a84c;font-weight:700;margin-top:3px;}
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="header-icon">🚻</div>
    <div>
      <div id="header-title">ห้องน้ำนครพนม</div>
      <div id="header-sub">งานบวงสรวงพญาศรีสัตตนาคราช</div>
    </div>
  </div>
</div>

<div id="filter-bar">
  <button class="chip active" onclick="setFilter('all',this)">ทั้งหมด</button>
  <button class="chip" onclick="setFilter('free',this)">ฟรี</button>
  <button class="chip" onclick="setFilter('open24',this)">เปิด 24 ชม.</button>
  <button class="chip" onclick="setFilter('disabled',this)">ผู้พิการ</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="route-bar">
    <div id="route-info" style="flex:1">
      <div id="route-name">กำลังคำนวณเส้นทาง...</div>
      <div id="route-detail"></div>
    </div>
    <button id="route-cancel" onclick="cancelRoute()">✕ ยกเลิก</button>
  </div>
  <div id="bottom-sheet">
    <div id="sheet-handle-area" onclick="toggleSheet()">
      <div id="sheet-handle"></div>
      <div id="sheet-summary">
        <span id="sheet-title">ลากขึ้นเพื่อดูรายการ</span>
        <b id="count-label">5 แห่ง</b>
      </div>
    </div>
    <div id="sheet-content">
      <div id="toilet-list"></div>
    </div>
  </div>
</div>

<div id="tab-bar">
  <div class="tab-item active" onclick="tabMap(this)">
    <svg viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
    <span>แผนที่</span>
  </div>
  <div class="tab-item" onclick="tabList(this)">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>รายการ</span>
  </div>
  <div id="locate-tab" onclick="locateMe()">
    <div id="locate-circle">📍</div>
    <div id="locate-label">ใกล้ฉัน</div>
  </div>
  <div class="tab-item" onclick="openFilter()">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
    <span>กรอง</span>
  </div>
  <div class="tab-item" onclick="alert('ห้องน้ำนครพนม\nพัฒนาสำหรับงานบวงสรวงพญาศรีสัตตนาคราช')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span>เกี่ยวกับ</span>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script>
const TOILETS=[
  {id:1,name:"ห้องน้ำลานพญาศรีสัตตนาคราช",lat:17.4094,lng:104.7783,type:"สาธารณะ",free:true,open24:true,disabled:true,hours:"24 ชม.",rooms:"ชาย 4 · หญิง 4"},
  {id:2,name:"ห้องน้ำเทศบาลหน้าเมือง",lat:17.4112,lng:104.7795,type:"สาธารณะ",free:true,open24:false,disabled:false,hours:"06:00–22:00",rooms:"ชาย 3 · หญิง 3"},
  {id:3,name:"ห้องน้ำวัดโอกาส",lat:17.4078,lng:104.7769,type:"วัด",free:true,open24:false,disabled:false,hours:"06:00–20:00",rooms:"ชาย 2 · หญิง 2"},
  {id:4,name:"ห้องน้ำตลาดอินโดจีน",lat:17.4055,lng:104.7752,type:"ตลาด",free:false,open24:false,disabled:false,hours:"07:00–21:00",rooms:"ชาย 3 · หญิง 4"},
  {id:5,name:"ห้องน้ำสวนสาธารณะเฉลิมพระเกียรติ",lat:17.4038,lng:104.7731,type:"สวนสาธารณะ",free:true,open24:false,disabled:true,hours:"05:00–21:00",rooms:"ชาย 3 · หญิง 3"},
];

let map,userMarker,markers=[],routeAdded=false;
let currentFilter='all',userLat=null,userLng=null,sheetOpen=false;

map=new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    sources:{
      'dark':{
        type:'raster',
        tiles:['https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png'],
        tileSize:256,
        attribution:'© Stadia Maps © OpenStreetMap'
      }
    },
    layers:[{id:'dark-layer',type:'raster',source:'dark'}]
  },
  center:[104.7783,17.4094],
  zoom:14,
  dragRotate:false,
  pitchWithRotate:false,
  attributionControl:false
});

map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-left');

function createPin(t,isNearest){
  const el=document.createElement('div');
  const bg=t.free?'#1a5c30':'#8b2500';
  const border=isNearest?'#c9a84c':'rgba(255,255,255,0.8)';
  const size=isNearest?'42px':'36px';
  const shadow=isNearest?'0 0 0 4px rgba(201,168,76,0.25), 0 3px 12px rgba(0,0,0,0.5)':'0 2px 8px rgba(0,0,0,0.5)';
  el.style.cssText=`width:${size};height:${size};background:${bg};border:2.5px solid ${border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:${shadow};cursor:pointer;transition:transform 0.15s;`;
  el.innerHTML='🚻';
  el.onmouseenter=()=>el.style.transform='scale(1.15)';
  el.onmouseleave=()=>el.style.transform='scale(1)';
  return el;
}

function getPopupHTML(t,dist){
  const ds=dist!==null?(dist<1000?`${Math.round(dist)} ม.`:`${(dist/1000).toFixed(1)} กม.`):'';
  const canNav=userLat!==null;
  return `<div style="font-family:'Sarabun',sans-serif;">
    <div style="font-size:15px;font-weight:700;color:#f0d080;margin-bottom:4px;padding-right:16px;">${t.name}</div>
    <div style="font-size:12px;color:#52b788;margin-bottom:${ds?'4px':'8px'}">${t.type} · ${t.hours} · ${t.rooms}</div>
    ${ds?`<div style="font-size:13px;font-weight:700;color:#c9a84c;margin-bottom:8px;">📍 ${ds} จากคุณ</div>`:''}
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${canNav?'12px':'0'}">
      <span style="background:${t.free?'#0d2a14':'#2a0f08'};color:${t.free?'#52b788':'#e07050'};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid ${t.free?'#1a5c30':'#5c2010'}">${t.free?'ฟรี':'มีค่าใช้จ่าย'}</span>
      ${t.open24?'<span style="background:#1a1408;color:#c9a84c;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #3a2a10">24 ชม.</span>':''}
      ${t.disabled?'<span style="background:#08142a;color:#5090d0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #103060">ผู้พิการ</span>':''}
    </div>
    ${canNav
      ?`<button onclick="startRoute(${t.lat},${t.lng},'${t.name}')" style="width:100%;background:linear-gradient(135deg,#c9a84c,#e8c56a);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;color:#0a1f12;cursor:pointer;font-family:'Sarabun',sans-serif;">🧭 นำทางมาที่นี่</button>`
      :'<div style="font-size:11px;color:#4a6a4a;text-align:center;padding:4px 0;">กดปุ่ม ใกล้ฉัน ก่อนเพื่อนำทาง</div>'
    }
  </div>`;
}

function calcDist(a,b,c,d){
  const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function filterToilets(){
  return TOILETS.filter(t=>{
    if(currentFilter==='free')return t.free;
    if(currentFilter==='open24')return t.open24;
    if(currentFilter==='disabled')return t.disabled;
    return true;
  }).map(t=>({...t,dist:userLat!==null?calcDist(userLat,userLng,t.lat,t.lng):null}))
  .sort((a,b)=>a.dist===null?0:a.dist-b.dist);
}

function renderAll(){
  markers.forEach(m=>m.remove());
  markers=[];
  const list=filterToilets();
  document.getElementById('count-label').textContent=`${list.length} แห่ง`;
  list.forEach((t,i)=>{
    const el=createPin(t,i===0&&userLat!==null);
    const popup=new maplibregl.Popup({closeButton:true,maxWidth:'260px',offset:22})
      .setHTML(getPopupHTML(t,t.dist));
    const m=new maplibregl.Marker({element:el}).setLngLat([t.lng,t.lat]).setPopup(popup).addTo(map);
    markers.push(m);
  });
  const el=document.getElementById('toilet-list');
  el.innerHTML='';
  if(userLat!==null){
    const near=list.filter(t=>t.dist<=500);
    const far=list.filter(t=>t.dist>500);
    if(near.length>0){el.innerHTML+=`<div class="sec-div near-div">📍 ในรัศมี 500 เมตร — ${near.length} แห่ง</div>`;near.forEach(t=>el.innerHTML+=makeItem(t,true));}
    if(far.length>0){el.innerHTML+=`<div class="sec-div far-div">ไกลกว่า 500 เมตร — ${far.length} แห่ง</div>`;far.forEach(t=>el.innerHTML+=makeItem(t,false));}
  } else {
    list.forEach(t=>el.innerHTML+=makeItem(t,false));
  }
}

function makeItem(t,nearby){
  const ds=t.dist!==null?(t.dist<1000?`${Math.round(t.dist)} ม.`:`${(t.dist/1000).toFixed(1)} กม.`):'';
  return `<div class="toilet-item ${nearby?'nearby':'far'}" onclick="focusToilet(${t.lng},${t.lat})">
    <div class="ti-icon ${t.free?'free':'paid'}">🚻</div>
    <div style="flex:1;min-width:0">
      <div class="ti-name">${t.name}</div>
      <div class="ti-meta">${t.type} · ${t.hours}</div>
      <div class="tags">
        <span class="tag ${t.free?'tag-green':'tag-orange'}">${t.free?'ฟรี':'มีค่าใช้จ่าย'}</span>
        ${t.open24?'<span class="tag tag-yellow">24 ชม.</span>':''}
        ${t.disabled?'<span class="tag tag-blue">ผู้พิการ</span>':''}
      </div>
    </div>
    ${ds?`<div class="ti-dist ${nearby?'near':'far'}">${ds}</div>`:''}
  </div>`;
}

function focusToilet(lng,lat){
  closeSheet();
  map.flyTo({center:[lng,lat],zoom:17,duration:800});
  setTimeout(()=>{markers.forEach(m=>{if(Math.abs(m.getLngLat().lat-lat)<0.0001)m.togglePopup();});},900);
}

function startRoute(toLat,toLng,name){
  if(routeAdded&&map.getSource('route')){map.removeLayer('route-line-bg');map.removeLayer('route-line');map.removeSource('route');routeAdded=false;}
  document.getElementById('route-name').textContent='🧭 นำทางไป '+name;
  document.getElementById('route-detail').textContent='กำลังคำนวณเส้นทาง...';
  document.getElementById('route-bar').classList.add('show');
  closeSheet();
  fetch(`https://router.project-osrm.org/route/v1/driving/${userLng},${userLat};${toLng},${toLat}?overview=full&geometries=geojson`)
    .then(r=>r.json()).then(data=>{
      if(data.routes&&data.routes[0]){
        const route=data.routes[0];
        const dist=route.distance<1000?`${Math.round(route.distance)} ม.`:`${(route.distance/1000).toFixed(1)} กม.`;
        const mins=Math.round(route.duration/60);
        document.getElementById('route-detail').textContent=`ระยะทาง ${dist} · ประมาณ ${mins} นาที`;
        map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:route.geometry}});
        map.addLayer({id:'route-line-bg',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#000','line-width':10,'line-opacity':0.3}});
        map.addLayer({id:'route-line',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#c9a84c','line-width':5,'line-opacity':1}});
        routeAdded=true;
        const coords=route.geometry.coordinates;
        const bounds=coords.reduce((b,c)=>b.extend(c),new maplibregl.LngLatBounds(coords[0],coords[0]));
        map.fitBounds(bounds,{padding:60,duration:800});
      }
    }).catch(()=>{document.getElementById('route-detail').textContent='ไม่สามารถคำนวณเส้นทางได้';});
}

function cancelRoute(){
  if(routeAdded&&map.getSource('route')){map.removeLayer('route-line-bg');map.removeLayer('route-line');map.removeSource('route');routeAdded=false;}
  document.getElementById('route-bar').classList.remove('show');
}

function toggleSheet(){sheetOpen=!sheetOpen;document.getElementById('bottom-sheet').classList.toggle('open',sheetOpen);document.getElementById('sheet-title').textContent=sheetOpen?'รายการห้องน้ำ':'ลากขึ้นเพื่อดูรายการ';}
function openSheet(){sheetOpen=true;document.getElementById('bottom-sheet').classList.add('open');document.getElementById('sheet-title').textContent='รายการห้องน้ำ';}
function closeSheet(){sheetOpen=false;document.getElementById('bottom-sheet').classList.remove('open');document.getElementById('sheet-title').textContent='ลากขึ้นเพื่อดูรายการ';}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));if(el)el.classList.add('active');renderAll();}
function openFilter(){document.getElementById('filter-bar').scrollIntoView({behavior:'smooth'});}
function tabMap(el){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');closeSheet();}
function tabList(el){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));el.classList.add('active');openSheet();}

function locateMe(){
  const circle=document.getElementById('locate-circle');
  const label=document.getElementById('locate-label');
  circle.textContent='⏳';circle.classList.add('loading');label.textContent='กำลังหา...';
  if(!navigator.geolocation){alert('เบราว์เซอร์ไม่รองรับ GPS');circle.textContent='📍';circle.classList.remove('loading');label.textContent='ใกล้ฉัน';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    if(userMarker)userMarker.remove();
    const el=document.createElement('div');
    el.style.cssText='width:18px;height:18px;background:#c9a84c;border:3px solid #0d1117;border-radius:50%;box-shadow:0 0 0 4px rgba(201,168,76,0.3),0 2px 8px rgba(0,0,0,0.5);';
    userMarker=new maplibregl.Marker({element:el}).setLngLat([userLng,userLat]).addTo(map);
    if(map.getSource('radius')){map.removeLayer('radius-fill');map.removeLayer('radius-line');map.removeSource('radius');}
    const steps=64,r=500/111320,center=[userLng,userLat];
    const coords=Array.from({length:steps+1},(_,i)=>{const a=i*360/steps*Math.PI/180;return[center[0]+r*Math.cos(a)/Math.cos(center[1]*Math.PI/180),center[1]+r*Math.sin(a)];});
    map.addSource('radius',{type:'geojson',data:{type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}}});
    map.addLayer({id:'radius-fill',type:'fill',source:'radius',paint:{'fill-color':'#c9a84c','fill-opacity':0.08}});
    map.addLayer({id:'radius-line',type:'line',source:'radius',paint:{'line-color':'#c9a84c','line-width':2,'line-dasharray':[5,4]}});
    map.flyTo({center:[userLng,userLat],zoom:15,duration:800});
    circle.textContent='📍';circle.classList.remove('loading');label.textContent='ใกล้ฉัน';
    renderAll();openSheet();
  },()=>{alert('ไม่สามารถหาตำแหน่งได้\nกรุณาอนุญาต GPS');circle.textContent='📍';circle.classList.remove('loading');label.textContent='ใกล้ฉัน';});
}

map.on('load',()=>renderAll());
</script>
</body>
</html>
